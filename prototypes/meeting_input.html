<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>相続プラットフォーム｜案件編集</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F7F8FA;--white:#FFFFFF;--border:#E4E7EC;--border2:#CBD2DC;
  --text:#111827;--text2:#374151;--muted:#6B7280;--muted2:#9CA3AF;
  --blue:#2563EB;--blue-l:#EFF4FF;--green:#059669;--green-l:#ECFDF5;
  --amber:#D97706;--amber-l:#FFFBEB;--red:#DC2626;--red-l:#FEF2F2;
  --purple:#7C3AED;--purple-l:#F5F3FF;
  --sh0:0 1px 2px rgba(0,0,0,.05);
  --sh1:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 6px rgba(0,0,0,.06),0 2px 4px rgba(0,0,0,.04);
  --sh3:0 10px 25px rgba(0,0,0,.08),0 4px 10px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:14px}

/* ===== SIDEBAR ===== */
.sidebar{width:228px;min-height:100vh;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:20}
.logo{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.logo-text{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14px;color:var(--text)}
.logo-sub{font-size:10px;color:var(--muted)}
.nav{padding:12px;flex:1;overflow-y:auto}
.nav-sec{font-size:10px;font-weight:700;color:var(--muted2);letter-spacing:1.5px;text-transform:uppercase;padding:10px 8px 4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .1s;margin-bottom:1px;text-decoration:none}
.nav-item:hover{background:var(--bg);color:var(--text2)}
.nav-item.active{background:var(--blue-l);color:var(--blue);font-weight:600}
.nav-icon{font-size:14px;width:18px;text-align:center}
.nav-badge{margin-left:auto;background:var(--blue);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;font-family:'DM Mono',monospace}
.nav-badge.w{background:var(--amber)}
.sb-foot{padding:12px 16px;border-top:1px solid var(--border)}
.user-card{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:6px;cursor:pointer;transition:background .1s}
.user-card:hover{background:var(--bg)}
.av{width:30px;height:30px;background:linear-gradient(135deg,#2563EB,#7C3AED);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.un{font-size:12px;font-weight:600;color:var(--text)}
.ur{font-size:10px;color:var(--muted)}

/* ===== MAIN LAYOUT ===== */
.main{margin-left:228px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--white);position:sticky;top:0;z-index:10;box-shadow:var(--sh0)}
.page-title{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:16px;letter-spacing:-.3px}
.page-bc{font-size:11px;color:var(--muted)}
.tbr{margin-left:auto;display:flex;align-items:center;gap:10px}
.btn{padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .12s;font-family:'Noto Sans JP',sans-serif;display:inline-flex;align-items:center;gap:5px}
.btn-p{background:var(--blue);color:#fff}
.btn-p:hover{background:#1D4ED8;box-shadow:var(--sh2)}
.btn-g{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-g:hover{background:var(--bg)}
.content{padding:20px 24px;flex:1}

/* ===== CASE SELECTION ===== */
.th{background:var(--bg);border-bottom:1px solid var(--border);padding:10px 14px;font-size:11px;font-weight:700;color:var(--muted);text-align:left;letter-spacing:.5px}
.td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px}
.case-row{cursor:pointer;transition:background .1s}
.case-row:hover{background:var(--bg)}
.case-status{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600;background:#EFF6FF;color:#3B82F6;border:1px solid #BFDBFE;margin-top:10px}
.case-status::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
/* case select table styles handled by .th .td .case-row */
.new-case-icon{width:48px;height:48px;background:var(--bg);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.new-case-label{font-size:14px;font-weight:600;color:var(--text2)}
.new-case-sub{font-size:11px;color:var(--muted)}

/* ===== STEP TABS ===== */
.step-tabs-wrap{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:4px;display:flex;gap:2px;overflow-x:auto;margin-bottom:6px;box-shadow:var(--sh0)}
.step-tabs-wrap::-webkit-scrollbar{display:none}
.step-tab-item{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .12s;border:none;background:none;font-family:'Noto Sans JP',sans-serif;position:relative}
.step-tab-item:hover{color:var(--text2);background:var(--bg)}
.step-tab-item.active{background:var(--blue);color:#fff;font-weight:600}
.step-tab-item.done{color:var(--green)}
.step-tab-item.done::after{content:' \2713';font-size:10px}

/* ===== PROGRESS BAR ===== */
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:16px}
.progress-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .4s ease}

/* ===== FORM STYLES ===== */
.form-area{max-width:800px}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.section-icon{width:40px;height:40px;background:var(--blue);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.section-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:.3px}
.section-sub{font-size:12px;color:var(--muted);margin-top:2px}

.card{background:var(--white);border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:var(--sh0);border:1px solid var(--border)}
.card-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.required-dot{width:6px;height:6px;background:var(--red);border-radius:50%;display:inline-block}

.input-field{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:11px 14px;font-family:'Noto Sans JP',sans-serif;font-size:14px;color:var(--text);transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
.input-field:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);background:#fff}
textarea.input-field{resize:vertical;min-height:80px;line-height:1.6}

.input-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ===== PILLS ===== */
.pill-group{display:flex;flex-wrap:wrap;gap:8px}
.pill{padding:9px 16px;border-radius:100px;border:1.5px solid var(--border);font-size:13px;font-weight:500;color:var(--muted);background:var(--bg);cursor:pointer;transition:all .15s;user-select:none}
.pill:active{transform:scale(.96)}
.pill.selected{background:var(--blue);border-color:var(--blue);color:#fff}
.pill.selected.multi{background:#1D4ED8;border-color:#1D4ED8}

/* ===== TOGGLE CARDS ===== */
.toggle-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:600px){.toggle-grid{grid-template-columns:repeat(2,1fr)}}
.toggle-card{border:1.5px solid var(--border);border-radius:10px;padding:12px 10px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg);user-select:none}
.toggle-card:active{transform:scale(.97)}
.toggle-card .tc-icon{font-size:20px;margin-bottom:4px}
.toggle-card .tc-label{font-size:12px;font-weight:500;color:var(--muted)}
.toggle-card.on{background:var(--green-l);border-color:var(--green)}
.toggle-card.on .tc-label{color:var(--green);font-weight:700}

/* ===== NUMBER STEPPER ===== */
.number-stepper{display:flex;align-items:center;gap:0;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;overflow:hidden;width:160px}
.stepper-btn{width:44px;height:44px;background:none;border:none;font-size:20px;color:var(--blue);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s}
.stepper-btn:active{background:rgba(37,99,235,.08)}
.stepper-val{flex:1;text-align:center;font-size:18px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text);border:none;background:none;width:60px}

/* ===== HEIR/PROP BLOCK ===== */
.heir-block{border:1.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;background:var(--bg);position:relative}
.heir-number{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.btn-remove{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;border:none;background:var(--red-l);color:var(--red);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-add{width:100%;padding:14px;border:2px dashed var(--border);border-radius:10px;background:none;color:var(--blue);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Noto Sans JP',sans-serif}
.btn-add:hover{border-color:var(--blue);background:var(--blue-l)}

/* ===== CALC BOX ===== */
.calc-box{background:linear-gradient(135deg,#1E3A5F 0%,#0F2440 100%);border-radius:12px;padding:18px 20px;color:#fff;margin-bottom:14px}
.calc-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.calc-row:last-child{border-bottom:none}
.calc-row-label{font-size:12px;color:rgba(255,255,255,.6)}
.calc-row-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:#60A5FA}
.calc-row-val.warn{color:var(--amber)}
.calc-row-val.danger{color:#FC8181}
.tax-badge{display:inline-block;padding:4px 12px;border-radius:100px;font-size:13px;font-weight:700;margin-top:8px}
.tax-badge.required{background:#FC8181;color:#fff}
.tax-badge.not-required{background:var(--green);color:#fff}
.tax-badge.unknown{background:rgba(255,255,255,.2);color:rgba(255,255,255,.7)}

/* ===== RANK ===== */
.rank-display{display:flex;align-items:center;gap:16px;margin-top:12px}
.rank-circle{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;font-family:'DM Mono',monospace;flex-shrink:0;transition:all .3s}
.rank-S{background:#FEF3C7;color:#B45309;box-shadow:0 4px 12px rgba(245,200,66,.3)}
.rank-A{background:#DBEAFE;color:#1D4ED8;box-shadow:0 4px 12px rgba(37,99,235,.2)}
.rank-B{background:#F0FDF4;color:#15803D;box-shadow:0 4px 12px rgba(21,128,61,.15)}
.rank-C{background:#FFF7ED;color:#C2410C;box-shadow:0 4px 12px rgba(194,65,12,.15)}
.rank-D{background:#FEF2F2;color:#B91C1C;box-shadow:0 4px 12px rgba(185,28,28,.15)}
.rank-unknown{background:var(--border);color:var(--muted)}
.rank-desc{font-size:13px;color:var(--muted);line-height:1.5}

/* ===== CONFIRM ===== */
.confirm-section{margin-bottom:20px}
.confirm-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:0 0 8px;border-bottom:1.5px solid var(--border);margin-bottom:12px}
.confirm-row{display:flex;padding:8px 0;border-bottom:1px solid var(--bg);gap:12px}
.confirm-key{font-size:12px;color:var(--muted);flex:0 0 140px;padding-top:1px}
.confirm-val{font-size:14px;font-weight:500;color:var(--text);flex:1;word-break:break-all}
.confirm-val.empty{color:var(--border);font-style:italic}
.chip{display:inline-block;background:var(--blue-l);border:1px solid #BFDBFE;color:var(--blue);font-size:12px;font-weight:600;padding:2px 10px;border-radius:100px;margin:2px 2px 2px 0}

/* ===== BOTTOM BAR (in content) ===== */
.bottom-bar{display:flex;justify-content:flex-end;gap:10px;padding:16px 0;margin-top:8px;border-top:1px solid var(--border)}
.btn-prev{flex:0 0 auto;padding:12px 20px;border-radius:8px;border:1.5px solid var(--border);background:#fff;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s}
.btn-prev:hover{background:var(--bg)}
.btn-next{flex:0 0 auto;padding:12px 32px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;box-shadow:var(--sh1)}
.btn-next:hover{background:#1D4ED8;box-shadow:var(--sh2)}
.btn-next:active{transform:scale(.98)}
.btn-submit{background:var(--green);box-shadow:0 4px 12px rgba(5,150,105,.25)}
.btn-submit:hover{background:#047857}

/* ===== SUCCESS ===== */
.success-view{text-align:center;padding:60px 20px}
.success-icon{width:72px;height:72px;background:linear-gradient(135deg,var(--green) 0%,#047857 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 24px;box-shadow:0 8px 24px rgba(5,150,105,.3);color:#fff}
.success-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:8px}
.success-sub{font-size:14px;color:var(--muted);line-height:1.7}
.json-box{background:#1E1E1E;border-radius:12px;padding:20px;margin-top:24px;text-align:left;overflow-x:auto}
.json-box pre{font-family:'DM Mono',monospace;font-size:11px;color:#D4D4D4;white-space:pre-wrap;word-break:break-all;line-height:1.6}
.btn-copy{display:block;width:100%;margin-top:12px;padding:12px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.btn-restart{display:block;width:100%;margin-top:8px;padding:12px;border-radius:8px;border:1.5px solid var(--border);background:#fff;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans JP',sans-serif}

/* ===== REC BAR ===== */
.rec-bar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:#1E293B;border-radius:10px;margin-bottom:14px;box-shadow:var(--sh1);transition:all .3s}
.rec-bar.hidden-bar{display:none}
.rec-dot{width:10px;height:10px;border-radius:50%;background:#FC8181;flex-shrink:0;animation:recPulse 1s infinite}
@keyframes recPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.rec-dot.paused{animation:none;background:var(--amber)}
.rec-dot.stopped{animation:none;background:var(--muted)}
.rec-timer{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:#fff;min-width:52px}
.rec-label{font-size:12px;color:rgba(255,255,255,.5);flex:1}
.rec-btn{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;flex-shrink:0}
.rec-btn:active{transform:scale(.9)}
.rec-btn.pause{background:rgba(255,255,255,.15);color:#fff}
.rec-btn.stop{background:#FC8181;color:#fff}

/* ===== REC TOGGLE ===== */
.rec-toggle{width:34px;height:34px;border-radius:50%;border:2px solid var(--border);background:var(--bg);color:var(--muted);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.rec-toggle.recording{background:#FC8181;border-color:#FC8181;color:#fff;animation:recPulse 1.2s infinite}

/* ===== AI STYLES ===== */
.ai-filled{border-color:var(--green)!important;background:#ECFDF5!important;box-shadow:0 0 0 3px rgba(5,150,105,.12)!important}
.ai-badge{display:inline-flex;align-items:center;gap:4px;background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;margin-left:8px;vertical-align:middle;letter-spacing:.5px}
.ai-pill{border-color:var(--green)!important;background:var(--green-l)!important;color:var(--green)!important;font-weight:700!important}
.ai-overlay{position:fixed;inset:0;background:rgba(17,24,39,.85);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.ai-overlay-icon{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--blue) 0%,#1D4ED8 100%);display:flex;align-items:center;justify-content:center;font-size:32px;animation:aiPulse 1.5s infinite}
@keyframes aiPulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(37,99,235,.4)}50%{transform:scale(1.05);box-shadow:0 0 0 16px rgba(37,99,235,0)}}
.ai-overlay-title{font-size:18px;font-weight:700;color:#fff}
.ai-overlay-sub{font-size:13px;color:rgba(255,255,255,.55);text-align:center;line-height:1.7}
.ai-progress-steps{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.ai-step{display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(255,255,255,.4);transition:color .3s}
.ai-step.active{color:#60A5FA}
.ai-step.done{color:rgba(255,255,255,.7)}
.ai-step-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);flex-shrink:0;transition:background .3s}
.ai-step.active .ai-step-dot{background:#60A5FA;animation:recPulse 1s infinite}
.ai-step.done .ai-step-dot{background:#60A5FA;animation:none}

.divider{height:1px;background:var(--border);margin:16px 0}
.spacer{height:12px}
.flex-row{display:flex;align-items:center;gap:10px}
.hidden{display:none!important}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:600;white-space:nowrap;border:1px solid transparent}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}

::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>

    <div class="logo-icon">&#9878;&#65039;</div>
    <div><div class="logo-text">相続プラットフォーム</div><div class="logo-sub">Ocean Platform</div></div>
  </div>

    <a class="nav-item" href="task.html"><span class="nav-icon">&#9989;</span>タスク一覧</a>

</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div><div class="page-title">案件編集（AI音声入力対応）</div><div class="page-bc">相続プラットフォーム / 案件編集</div></div>
    <div class="tbr">
      <div class="date-badge" id="headerDate" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)"></div>
      <button class="rec-toggle" id="recToggleBtn" onclick="toggleFullRecording()" title="面談全体を録音">&#127908;&#65039;</button>
      <button class="btn btn-g" onclick="backToSelect()">&#128281; 案件選択に戻る</button>
    </div>
  </div>

  <div class="content">
    <!-- Case selection screen (Step 0) -->
    <div id="caseSelectScreen">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
        <div style="flex:1;min-width:200px">
          <div style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:18px;letter-spacing:-.3px;margin-bottom:4px">面談設定済 案件一覧</div>

      <!-- Search -->
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <div style="flex:1;position:relative">
          <input type="text" id="caseSearch" placeholder="案件名・依頼者名・電話番号で検索" oninput="filterCases()" style="width:100%;padding:10px 14px 10px 36px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Noto Sans JP',sans-serif;background:var(--white);color:var(--text);outline:none;transition:border-color .2s">
          <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted)">🔍</span>

      <div style="background:var(--white);border:1px solid var(--border);border-radius:12px;box-shadow:var(--sh0);overflow:hidden">
        <table style="width:100%;border-collapse:collapse" id="caseTable">
          <thead>
            <tr>
              <th class="th">案件番号</th>
              <th class="th">案件名</th>
              <th class="th">依頼者</th>
              <th class="th">電話番号</th>
              <th class="th">面談日時</th>
              <th class="th">ステータス</th>
              <th class="th" style="width:80px">操作</th>
            </tr>
          </thead>
          <tbody id="caseTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Meeting form screen -->
    <div id="meetingFormScreen" style="display:none">
      <!-- REC BAR -->
      <div class="rec-bar hidden-bar" id="recBar">
        <div class="rec-dot" id="recDot"></div>
        <div class="rec-timer" id="recTimer">00:00</div>
        <div class="rec-label" id="recLabel">録音中...</div>
        <button class="rec-btn pause" id="recPauseBtn" onclick="pauseResume()">&#9208;</button>
        <button class="rec-btn stop" onclick="stopFullRecording()">&#9632;</button>
      </div>

      <!-- Step tabs -->
      <div class="step-tabs-wrap" id="stepNav"></div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

      <!-- Form content -->
      <div class="form-area" id="mainContent"></div>

      <!-- Bottom nav -->
      <div class="bottom-bar" id="bottomBar">
        <button class="btn-prev" id="btnPrev" onclick="prevStep()">&#8592; 戻る</button>
        <button class="btn-next" id="btnNext" onclick="nextStep()">次へ &#8594;</button>
      </div>
    </div>
  </div>
</main>

<script>
// ============================================================
// SAMPLE CASES
// ============================================================
const SAMPLE_CASES = [
  {id:'C2025-0082', name:'高橋 守 様 相続案件', client:'高橋 恵子', phone:'03-3333-4444', meetingDate:'2026/03/27 10:00', status:'面談設定済'},
  {id:'C2025-0085', name:'渡辺 正雄 様 相続案件', client:'渡辺 美智子', phone:'048-555-6666', meetingDate:'2026/03/27 14:00', status:'面談設定済'},
  {id:'C2025-0087', name:'伊藤 清 様 相続案件', client:'伊藤 良子', phone:'080-1111-2222', meetingDate:'2026/03/28 10:30', status:'面談設定済'},
  {id:'C2025-0089', name:'中村 太郎 様 相続案件', client:'中村 花子', phone:'03-1234-5678', meetingDate:'2026/03/28 14:00', status:'面談設定済'},
  {id:'C2025-0090', name:'佐藤 一郎 様 相続案件', client:'佐藤 美咲', phone:'090-9876-5432', meetingDate:'2026/03/29 10:00', status:'面談設定済'},
  {id:'C2025-0091', name:'田中 義男 様 相続案件', client:'田中 和子', phone:'045-111-2222', meetingDate:'2026/03/30 13:30', status:'面談設定済'},
  {id:'C2025-0093', name:'山本 勝 様 相続案件', client:'山本 節子', phone:'044-777-8888', meetingDate:'2026/03/31 11:00', status:'面談設定済'},
  {id:'C2025-0094', name:'小林 哲也 様 相続案件', client:'小林 裕子', phone:'03-9999-0000', meetingDate:'2026/04/01 15:00', status:'面談設定済'},
];

let selectedCaseId = null;

function renderCaseSelect(cases) {
  const list = cases || SAMPLE_CASES;
  document.getElementById('caseCount').textContent = `${list.length} 件`;
  const tbody = document.getElementById('caseTableBody');
  if (list.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" style="padding:40px;text-align:center;color:var(--muted);font-size:13px">検索条件に一致する案件がありません</td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(c => `<tr class="case-row" onclick="selectCase('${c.id}')">
    <td class="td"><span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:var(--bg);padding:2px 6px;border-radius:4px;border:1px solid var(--border)">${c.id}</span></td>
    <td class="td"><span style="font-weight:600;color:var(--text)">${c.name}</span></td>
    <td class="td">${c.client}</td>
    <td class="td"><span style="font-family:'DM Mono',monospace;font-size:11px">${c.phone}</span></td>
    <td class="td"><span style="font-family:'DM Mono',monospace;font-size:11px">${c.meetingDate}</span></td>
    <td class="td"><span style="display:inline-flex;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;background:var(--blue-l);color:var(--blue);border:1px solid var(--blue-m)">${c.status}</span></td>
    <td class="td"><button style="padding:5px 12px;border-radius:6px;border:none;background:var(--blue);color:#fff;font-size:11px;font-weight:600;cursor:pointer" onclick="event.stopPropagation();selectCase('${c.id}')">選択</button></td>
  </tr>`).join('');
}

function filterCases() {
  const q = (document.getElementById('caseSearch').value || '').toLowerCase();
  if (!q) { renderCaseSelect(); return; }
  const filtered = SAMPLE_CASES.filter(c =>
    c.id.toLowerCase().includes(q) ||
    c.name.toLowerCase().includes(q) ||
    c.client.toLowerCase().includes(q) ||
    c.phone.includes(q)
  );
  renderCaseSelect(filtered);
}

function selectCase(id) {
  selectedCaseId = id;
  document.getElementById('caseSelectScreen').style.display = 'none';
  document.getElementById('meetingFormScreen').style.display = 'block';

  // Pre-fill data if selecting existing case
  if (id !== 'new') {
    const c = SAMPLE_CASES.find(x => x.id === id);
    if (c) {
      // Extract deceased name from case name
      const deceasedName = c.name.replace(' 様 相続案件','');
      data.Deceased_Name = deceasedName;
      data.Client_Name = c.client;
      data.Client_Phone = c.phone;
    }
  }

  buildNav();
  renderStep(0);
}

function backToSelect() {
  document.getElementById('caseSelectScreen').style.display = 'block';
  document.getElementById('meetingFormScreen').style.display = 'none';
  // Reset form
  Object.keys(data).forEach(k => {
    if (Array.isArray(data[k])) data[k] = [];
    else if (typeof data[k] === 'boolean') data[k] = false;
    else if (k === 'Order_Date') data[k] = new Date().toISOString().slice(0,10);
    else data[k] = '';
  });
  currentStep = 0;
  completedSteps.clear();
  AI_FILLED_FIELDS.clear();
  selectedCaseId = null;
}

// ============================================================
// DATA MODEL
// ============================================================
const data = {
  // 基本
  Sales_Owner: '', Order_Date: new Date().toISOString().slice(0,10), Difficulty: '',
  // 依頼者
  Client_Name: '', Client_Kana: '', Client_Phone: '', Client_Mobile: '', Client_Email: '',
  Client_Zip: '', Client_Address: '', Client_Birthday: '', Client_Gaiji: '',
  Contact_Preference: [], Customer_Number: '',
  // 被相続人
  Deceased_Name: '', Deceased_Kana: '', Deceased_Birthday: '', Date_of_Death: '',
  Deceased_Address: '', Deceased_Domicile: '',
  // 相続人
  heirs: [],
  // 受注内容
  Procedure_Type: [], Other_Procedure: '', Additional_Services: [],
  Task_Koseki: false, Task_Chart: false, Task_Legal_Info: false, Task_RealEstate: false,
  Task_Finance: false, Task_Inventory: false, Task_Agreement: false, Task_Registration: false,
  Task_Cancel: false, Task_Letter: false, Task_Will: false, Task_Petition: false,
  Task_Contract: false, Task_Appraisal: false,
  // 受注ルート
  Lead_Source: '', LP_Partner_Name: '', Partner_Rep: '', Referral_To: '', Referral_Rep: '',
  Referral_Sheet_Done: false,
  // 不動産（物件概要）
  Property_Sale: '', Resident_Status: '', Resident_Name: '', Title_Deed: false,
  Tax_Notice: false, Valuation_Method: '', RE_Agent: '', Sale_Schedule: '',
  Property_Type: '', Building_Age: '', Area_Rating: '', Sale_Urgency: '',
  Mansion_Note: false, Property_General_Notes: '', Property_Rank: '',
  // 不動産明細（複数件）
  properties: [],
  // 分割内容（複数件）
  divisions: [],
  // 金融（複数件）
  bank_accounts: [],
  securities: [],
  trust_banks: [],
  // 金融（共通）
  Passbook_Status: '', Cancellation_Support: '', Bank_Names: '',
  // 資産・相続税
  Total_Asset_Estimate: '', Tax_Filing_Required: '', Tax_Advisor_Referral: '',
  Tax_Advisor_Name: '', Tax_Filing_Deadline: '',
  // 遺産分割
  Client_Intention: '', Distribution_Policy: '', Distribution_Proposal: '',
  Agreement_Signing: '', Inventory_Items: [], Tax_Case_Reference: false,
  // 郵送
  Mailing_Destination: '', Alt_Mailing_Address: '', Important_Notes: '', Survey_Document: '',
  // 遺言
  Will_Type: '', Will_Storage: '', Will_Execution: '', Iryubun_Risk: '', Bequest: '',
  Creation_Location: '', Notary_Office: '',
  // 信託
  Trust_Type: '',
  // 生命保険
  Insurance_Proposal: '', Insurance_Company: '', Insurance_Detail: '',
  Insurance_Assoc_Inquiry: '', Insurance_Inquiry_Notes: '',
};

// ============================================================
// STEPS CONFIG
// ============================================================
const STEPS = [
  { id: 'basic',      label: '基本情報',   icon: '📋' },
  { id: 'client',     label: '依頼者',     icon: '👤' },
  { id: 'deceased',   label: '被相続人',   icon: '📁' },
  { id: 'heirs',      label: '相続人',     icon: '👨‍👩‍👧' },
  { id: 'order',      label: '受注内容',   icon: '📝' },
  { id: 'property',   label: '不動産',     icon: '🏠' },
  { id: 'propdetail', label: '不動産明細', icon: '📍' },
  { id: 'finance',    label: '金融・税',   icon: '💴' },
  { id: 'findetail',  label: '金融詳細',   icon: '🏦' },
  { id: 'division',   label: '分割・遺言', icon: '⚖️' },
  { id: 'confirm',    label: '確認',       icon: '✅' },
];

let currentStep = 0;
const completedSteps = new Set();

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('headerDate').textContent =
    new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'2-digit',day:'2-digit'});
  renderCaseSelect();
});

function buildNav() {
  const nav = document.getElementById('stepNav');
  nav.innerHTML = STEPS.map((s, i) =>
    `<div class="step-tab-item ${i===0?'active':''}" id="tab_${i}" onclick="goStep(${i})">${s.label}</div>`
  ).join('');
}

function updateNav() {
  STEPS.forEach((_, i) => {
    const tab = document.getElementById(`tab_${i}`);
    if (!tab) return;
    tab.className = 'step-tab-item' +
      (i === currentStep ? ' active' : '') +
      (completedSteps.has(i) && i !== currentStep ? ' done' : '');
  });
  const pct = ((currentStep + 1) / STEPS.length) * 100;
  const pf = document.getElementById('progressFill');
  if (pf) pf.style.width = pct + '%';
  document.getElementById(`tab_${currentStep}`)?.scrollIntoView({inline:'center',behavior:'smooth'});
}

function goStep(i) {
  currentStep = i;
  renderStep(i);
}

function nextStep() {
  completedSteps.add(currentStep);
  if (currentStep < STEPS.length - 1) {
    currentStep++;
    renderStep(currentStep);
    document.getElementById('meetingFormScreen').scrollTop = 0;
    window.scrollTo(0, 0);
  } else {
    showSuccess();
  }
}

function prevStep() {
  if (currentStep > 0) {
    currentStep--;
    renderStep(currentStep);
    window.scrollTo(0, 0);
  }
}

function renderStep(i) {
  updateNav();
  const main = document.getElementById('mainContent');
  const step = STEPS[i];
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  const bottomBar = document.getElementById('bottomBar');
  bottomBar.style.display = 'flex';
  btnPrev.style.display = i === 0 ? 'none' : 'block';
  const isLast = i === STEPS.length - 1;
  btnNext.textContent = isLast ? '✓ 送信・確定' : '次へ →';
  btnNext.className = 'btn-next' + (isLast ? ' btn-submit' : '');

  const renders = {
    basic:      renderBasic,
    client:     renderClient,
    deceased:   renderDeceased,
    heirs:      renderHeirs,
    order:      renderOrder,
    property:   renderProperty,
    propdetail: renderPropDetail,
    finance:    renderFinance,
    findetail:  renderFinDetail,
    division:   renderDivision,
    confirm:    renderConfirm,
  };
  main.innerHTML = '';
  renders[step.id]();
}

// ============================================================
// HELPERS
// ============================================================
function sectionHeader(icon, title, sub='') {
  return `<div class="section-header">
    <div class="section-icon">${icon}</div>
    <div><div class="section-title">${title}</div>${sub?`<div class="section-sub">${sub}</div>`:''}</div>
  </div>`;
}

function card(label, content, required=false) {
  return `<div class="card">
    <div class="card-label">${required?'<span class="required-dot"></span>':''}${label}</div>
    ${content}
  </div>`;
}

function textInput(key, placeholder='', type='text') {
  const val = data[key] || '';
  const aiClass = AI_FILLED_FIELDS.has(key) ? ' ai-filled' : '';
  const aiBadge = AI_FILLED_FIELDS.has(key) ? '<span class="ai-badge">✦ AI入力</span>' : '';
  return `${aiBadge}<input class="input-field${aiClass}" type="${type}" value="${val}"
    placeholder="${placeholder}"
    oninput="data['${key}']=this.value;AI_FILLED_FIELDS.delete('${key}')"
    onblur="updateCalc()">`;
}

function dateInput(key) {
  const val = data[key] || '';
  const aiClass = AI_FILLED_FIELDS.has(key) ? ' ai-filled' : '';
  const aiBadge = AI_FILLED_FIELDS.has(key) ? '<span class="ai-badge">✦ AI入力</span>' : '';
  return `${aiBadge}<input class="input-field${aiClass}" type="date" value="${val}"
    onchange="data['${key}']=this.value;AI_FILLED_FIELDS.delete('${key}');updateCalc()">`;
}

function textareaInput(key, placeholder='') {
  const val = data[key] || '';
  const aiClass = AI_FILLED_FIELDS.has(key) ? ' ai-filled' : '';
  const aiBadge = AI_FILLED_FIELDS.has(key) ? '<span class="ai-badge">✦ AI入力</span>' : '';
  return `${aiBadge}<textarea class="input-field${aiClass}" placeholder="${placeholder}"
    oninput="data['${key}']=this.value;AI_FILLED_FIELDS.delete('${key}')">${val}</textarea>`;
}

function pills(key, options, multi=false) {
  const aiBadge = AI_FILLED_FIELDS.has(key) ? '<span class="ai-badge">✦ AI入力</span>' : '';
  return `${aiBadge}<div class="pill-group">${options.map(o => {
    const isSelected = multi
      ? (data[key]||[]).includes(o)
      : data[key] === o;
    const isAi = isSelected && AI_FILLED_FIELDS.has(key);
    const cls = 'pill' + (isSelected ? (multi?' selected multi':' selected') : '') + (isAi ? ' ai-pill' : '');
    return `<div class="${cls}" onclick="togglePill('${key}','${o}',${multi})">${o}</div>`;
  }).join('')}</div>`;
}

function togglePill(key, val, multi) {
  if (multi) {
    if (!Array.isArray(data[key])) data[key] = [];
    const idx = data[key].indexOf(val);
    if (idx >= 0) data[key].splice(idx, 1);
    else data[key].push(val);
  } else {
    data[key] = data[key] === val ? '' : val;
  }
  renderStep(currentStep);
  updateCalc();
}

function toggleCards(tasks) {
  return `<div class="toggle-grid">${tasks.map(([key, icon, label]) => {
    const on = data[key];
    return `<div class="toggle-card ${on?'on':''}" onclick="data['${key}']=!data['${key}'];renderStep(currentStep)">
      <div class="tc-icon">${icon}</div>
      <div class="tc-label">${label}</div>
    </div>`;
  }).join('')}</div>`;
}

function toggleCheck(key, label) {
  const on = data[key];
  return `<div class="pill ${on?'selected':''}" onclick="data['${key}']=!data['${key}'];renderStep(currentStep)">${on?'✓ ':''} ${label}</div>`;
}

// STEP RENDERS
// ============================================================

    card('受注担当', textInput('Sales_Owner','担当者名を入力'), true) +
    card('難易度', pills('Difficulty', ['高','中','低'])) +
    card('受注ルート', pills('Lead_Source', ['LP','公益社','はせがわ','その他'])) +
    (data.Lead_Source === 'LP' ? card('LP名・担当者',
      `<div style="display:grid;gap:10px">
        ${textInput('LP_Partner_Name','LP会社名')}
        ${textInput('Partner_Rep','担当者名')}

    '<div class="spacer"></div>';
}

    card('生年月日', dateInput('Client_Birthday')) +

      ${textInput('Client_Email','example@email.com','email')}
    </div>`) +

    card('住所', `<div style="display:grid;gap:10px">
      ${textInput('Client_Zip','〒000-0000')}
      ${textInput('Client_Address','都道府県 市区町村 番地')}
    </div>`) +
    card('外字有無', pills('Client_Gaiji', ['あり','なし'])) +
    card('郵送先', pills('Mailing_Destination', ['依頼者住所','その他'])) +

function renderDeceased() {
  const m = document.getElementById('mainContent');
  m.innerHTML = sectionHeader('📁', '被相続人情報', 'お亡くなりになった方の情報') +
    card('氏名', `<div style="display:grid;gap:10px">${textInput('Deceased_Name','田中 花子')}${textInput('Deceased_Kana','たなか はなこ')}</div>`, true) +

    card('死亡日（相続開始日）', dateInput('Date_of_Death'), true) +

function renderHeirs() {
  const m = document.getElementById('mainContent');
  let heirHTML = '';
  data.heirs.forEach((h, i) => {
    heirHTML += `<div class="heir-block">
      <div class="heir-number">相続人 ${i+1}</div>
      <button class="btn-remove" onclick="removeHeir(${i})">✕</button>
      <div style="display:grid;gap:10px">
        <input class="input-field" placeholder="氏名" value="${h.Heir_Name||''}"
          oninput="data.heirs[${i}].Heir_Name=this.value">
        <input class="input-field" placeholder="ふりがな" value="${h.Heir_Kana||''}"
          oninput="data.heirs[${i}].Heir_Kana=this.value">
        <div class="pill-group">${['配偶者','子','父母','兄弟姉妹','代襲相続人','その他'].map(rel => {
          const sel = h.Relationship === rel;
          return `<div class="pill ${sel?'selected':''}"
            onclick="data.heirs[${i}].Relationship='${rel}';renderStep(currentStep)">${rel}</div>`;
        }).join('')}</div>
        <div class="flex-row">
          <div class="pill ${h.Legal_Heir?'selected':''}"
            onclick="data.heirs[${i}].Legal_Heir=!data.heirs[${i}].Legal_Heir;renderStep(currentStep);updateCalc()">
            ${h.Legal_Heir?'✓ ':''} 法定相続人
          </div>
        </div>
        <input class="input-field" placeholder="生年月日" type="date" value="${h.Heir_Birthday||''}"
          onchange="data.heirs[${i}].Heir_Birthday=this.value">
        <textarea class="input-field" placeholder="住所" style="min-height:60px"
          oninput="data.heirs[${i}].Heir_Address=this.value">${h.Heir_Address||''}</textarea>
        <textarea class="input-field" placeholder="本籍" style="min-height:60px"

function calcPropertyRank() {
  const area = data.Area_Rating;
  const status = data.Resident_Status;
  const age = parseInt(data.Building_Age)||0;
  if (!area && !status && !age) return '確認中';
  if (area === '人気エリア' && status === '空き家' && age <= 20) return 'S';
  if (area === '人気エリア' || (status === '空き家' && age <= 30)) return 'A';
  if (area === '標準') return 'B';
  if (area === '不人気エリア' || age > 40) return 'C';
  return 'B';
}

function updateCalc() {
  data.Property_Rank = calcPropertyRank();
  const legalHeirCount = data.heirs.filter(h=>h.Legal_Heir).length;
  const basicDeduction = 3000 + 600 * legalHeirCount;
  const assetMan = parseFloat(String(data.Total_Asset_Estimate).replace(/[,万円]/g,''))||0;
  if (data.Total_Asset_Estimate) {
    data.Tax_Filing_Required = assetMan > basicDeduction ? '要' : '不要';
  }
  if (data.Date_of_Death) {
    const d = new Date(data.Date_of_Death);
    d.setMonth(d.getMonth() + 10);
    data.Tax_Filing_Deadline = d.toISOString().slice(0,10);
  }
}

let mediaRecorder = null;
let audioChunks = [];
let recSeconds = 0;
let recInterval = null;
let recPaused = false;
let transcriptLog = [];
let fullTranscript = '';
let fullRecognition = null;

function toggleFullRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    stopFullRecording();
  } else {
    startFullRecording();
  }
}

async function startFullRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    recSeconds = 0;
    recPaused = false;
    transcriptLog = [];
    fullTranscript = '';

    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.start(1000);

    recInterval = setInterval(() => {
      if (!recPaused) {
        recSeconds++;
        document.getElementById('recTimer').textContent = formatTime(recSeconds);
      }
    }, 1000);

    document.getElementById('recBar').classList.remove('hidden-bar');
    document.getElementById('recToggleBtn').classList.add('recording');
    document.getElementById('recDot').className = 'rec-dot';
    document.getElementById('recLabel').textContent = '録音中 — 面談終了後に■で停止';

    startFullTranscription();

  } catch(e) {
    alert('マイクへのアクセスを許可してください');
  }
}

function startFullTranscription() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  fullRecognition = new SR();
  fullRecognition.lang = 'ja-JP';
  fullRecognition.continuous = true;
  fullRecognition.interimResults = false;

  fullRecognition.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        const text = e.results[i][0].transcript;
        const time = formatTime(recSeconds);
        transcriptLog.push({ time, text });
        fullTranscript += text + '。';
        const label = document.getElementById('recLabel');
        if (label) label.textContent = '「' + text.slice(0,20) + (text.length>20?'…':'') + '」';
      }
    }
  };

  fullRecognition.onend = () => {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      try { fullRecognition.start(); } catch(e) {}
    }
  };

  try { fullRecognition.start(); } catch(e) {}
}

function pauseResume() {
  if (!mediaRecorder) return;
  recPaused = !recPaused;
  if (recPaused) {
    mediaRecorder.pause();
    document.getElementById('recDot').className = 'rec-dot paused';
    document.getElementById('recPauseBtn').textContent = '▶';
    document.getElementById('recLabel').textContent = '一時停止中';
    if (fullRecognition) fullRecognition.stop();
  } else {
    mediaRecorder.resume();
    document.getElementById('recDot').className = 'rec-dot';
    document.getElementById('recPauseBtn').textContent = '⏸';
    document.getElementById('recLabel').textContent = '録音中...';
    startFullTranscription();
  }
}

function stopFullRecording() {
  if (!mediaRecorder) return;

  mediaRecorder.onstop = async () => {
    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
    await processWithWhisperAndClaude(audioBlob);
  };

  mediaRecorder.stop();
  mediaRecorder.stream.getTracks().forEach(t => t.stop());
  clearInterval(recInterval);
  if (fullRecognition) fullRecognition.stop();

  document.getElementById('recBar').classList.add('hidden-bar');
  document.getElementById('recToggleBtn').classList.remove('recording');
  document.getElementById('recToggleBtn').textContent = '📄';
  mediaRecorder = null;
}

const AI_FILLED_FIELDS = new Set();

const PROXY_BASE = 'https://your-api-proxy.example.com'; // placeholder

async function processWithWhisperAndClaude(audioBlob) {
  showAiOverlay('step1');

  try {
    const formData = new FormData();
    formData.append('file', audioBlob, 'recording.webm');
    formData.append('model', 'whisper-1');
    formData.append('language', 'ja');

    const whisperRes = await fetch(`${PROXY_BASE}/api/whisper`, {
      method: 'POST',
      body: formData,
    });

    if (!whisperRes.ok) throw new Error('Whisper APIエラー: ' + whisperRes.status);
    const whisperData = await whisperRes.json();
    const transcript = whisperData.text || '';

    data.Meeting_Transcript = transcript;

    showAiOverlay('step2');

    await runClaudeAutoFill(transcript);

  } catch(err) {
    hideAiOverlay();
    alert('AI処理中にエラーが発生しました：' + err.message + '\n\n手動で入力してください。');
    showTranscriptModal();
  }
}

async function runClaudeAutoFill(transcript) {
  if (!transcript) {
    hideAiOverlay();
    showTranscriptModal();
    return;
  }

  showAiOverlay('step2');

  const prompt = `以下は相続の面談の文字起こしテキストです。
このテキストから情報を抽出して、必ずJSONのみで返してください。マークダウンや説明文は不要です。

【文字起こし】
${transcript}

【抽出するJSONの形式】
{
  "Client_Name": "依頼者氏名（わかれば）",
  "Client_Kana": "依頼者ふりがな（わかれば）",
  "Client_Phone": "電話番号（わかれば）",
  "Deceased_Name": "被相続人氏名（わかれば）",
  "Deceased_Kana": "被相続人ふりがな（わかれば）",
  "Date_of_Death": "死亡日 YYYY-MM-DD形式（わかれば）",
  "Deceased_Address": "被相続人住所（わかれば）",
  "heirs": [{"Heir_Name":"氏名","Relationship":"関係（配偶者/子/父母/兄弟姉妹/その他）","Legal_Heir":true}],
  "Total_Asset_Estimate": "資産合計の数値のみ万円単位（わかれば）",
  "Bank_Names": "金融機関名（わかれば）",
  "Property_Sale": "不動産売却意向 有/無/検討中（わかれば）",
  "Resident_Status": "空き家/居住中（相続人）/居住中（第三者）/賃貸中（わかれば）",
  "Client_Intention": "依頼者の意向・要望（わかれば）",
  "Distribution_Policy": "分配方針（わかれば）",
  "Will_Type": "遺言種別 自筆/公正証書/その他（わかれば）",
  "Important_Notes": "特記事項・気になる点（わかれば）",
  "Difficulty": "難易度 易/普/難（総合判断）",
  "Tax_Filing_Required": "相続税申告 要/不要/確認中",
  "AI_Summary": "面談内容の要約（3〜5文）"
}

わからない項目は空文字列""にしてください。JSONのみ返してください。`;

  try {
    const res = await fetch(`${PROXY_BASE}/api/claude`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        messages: [{ role: 'user', content: prompt }],
      }),
    });

    if (!res.ok) throw new Error('Claude APIエラー: ' + res.status);
    const resData = await res.json();
    const rawText = resData.content?.[0]?.text || '{}';
    const clean = rawText.replace(/```json|```/g, '').trim();
    const extracted = JSON.parse(clean);

    showAiOverlay('step3');
    await new Promise(r => setTimeout(r, 600));

    applyAiExtraction(extracted, transcript);

    hideAiOverlay();
    showAiResultModal(extracted, transcript);

  } catch(err) {
    hideAiOverlay();
    alert('Claude APIエラー：' + err.message);
    showTranscriptModal();
  }
}

function applyAiExtraction(extracted, transcript) {
  AI_FILLED_FIELDS.clear();

  const simpleFields = [
    'Client_Name','Client_Kana','Client_Phone','Deceased_Name','Deceased_Kana',
    'Date_of_Death','Deceased_Address','Total_Asset_Estimate','Bank_Names',
    'Client_Intention','Distribution_Policy','Important_Notes','Will_Type',
    'Tax_Filing_Required','Difficulty','Property_Sale','Resident_Status',
  ];

  simpleFields.forEach(key => {
    if (extracted[key] && !data[key]) {
      data[key] = extracted[key];
      AI_FILLED_FIELDS.add(key);
    }
  });

  if (extracted.heirs && Array.isArray(extracted.heirs) && data.heirs.length === 0) {
    data.heirs = extracted.heirs.map(h => ({
      Heir_Name: h.Heir_Name || '',
      Heir_Kana: '',
      Relationship: h.Relationship || '',
      Legal_Heir: h.Legal_Heir !== false,
    }));
    AI_FILLED_FIELDS.add('heirs');
  }

  data.Meeting_Transcript = transcript;
  data.AI_Summary = extracted.AI_Summary || '';

  updateCalc();
}

// ===== AI Overlay =====
function showAiOverlay(activeStep) {
  let overlay = document.getElementById('aiOverlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'aiOverlay';
    overlay.className = 'ai-overlay';
    overlay.innerHTML = `
      <div class="ai-overlay-icon">🤖</div>
      <div class="ai-overlay-title">AI が面談内容を解析中</div>
      <div class="ai-overlay-sub">しばらくお待ちください</div>
      <div class="ai-progress-steps">
        <div class="ai-step" id="aistep-step1"><div class="ai-step-dot"></div>音声をテキストに変換中（Whisper）</div>
        <div class="ai-step" id="aistep-step2"><div class="ai-step-dot"></div>面談内容を構造化中（Claude）</div>
        <div class="ai-step" id="aistep-step3"><div class="ai-step-dot"></div>フォームに自動入力中</div>
      </div>`;
    document.body.appendChild(overlay);
  }
  ['step1','step2','step3'].forEach(s => {
    const el = document.getElementById('aistep-' + s);
    if (!el) return;
    const stepNum = parseInt(s.replace('step',''));
    const activeNum = parseInt(activeStep.replace('step',''));
    el.className = 'ai-step' + (stepNum === activeNum ? ' active' : stepNum < activeNum ? ' done' : '');
  });
}

function hideAiOverlay() {
  const overlay = document.getElementById('aiOverlay');
  if (overlay) overlay.remove();
}

// ===== AI Result Modal =====
function showAiResultModal(extracted, transcript) {
  const existing = document.getElementById('aiResultModal');
  if (existing) existing.remove();

  const filledCount = AI_FILLED_FIELDS.size;
  const summary = extracted.AI_Summary || '（要約なし）';

  const modal = document.createElement('div');
  modal.id = 'aiResultModal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;';
  modal.innerHTML = `
    <div style="background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:24px;box-shadow:var(--sh3);">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
        <div>
          <div style="font-size:17px;font-weight:700;color:var(--text)">🤖 AI自動入力が完了しました</div>
          <div style="font-size:12px;color:var(--muted);margin-top:4px">${filledCount}項目を自動入力しました。内容を確認してください。</div>
        </div>
        <button onclick="closeAiModal()"
          style="background:var(--bg);border:none;border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer;font-weight:700;color:var(--text);flex-shrink:0;">
          ✕
        </button>
      </div>

      <div style="background:linear-gradient(135deg,#1E3A5F 0%,#0F2440 100%);border-radius:12px;padding:16px;margin-bottom:16px;">
        <div style="font-size:11px;font-weight:700;color:#60A5FA;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">AI 面談サマリー</div>
        <div style="font-size:13px;color:rgba(255,255,255,0.85);line-height:1.7;">${summary}</div>
      </div>

      <div style="font-size:12px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;">自動入力された項目</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;">
        ${[...AI_FILLED_FIELDS].map(f => `<span style="background:var(--green-l);border:1px solid #A7F3D0;color:var(--green);font-size:12px;font-weight:600;padding:4px 12px;border-radius:100px;">${fieldLabel(f)}</span>`).join('')}
      </div>

      <div style="background:#1E1E1E;border-radius:12px;padding:16px;margin-bottom:16px;">
        <div style="font-size:11px;font-weight:700;color:#60A5FA;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">文字起こし全文</div>
        <div style="font-size:12px;color:#D4D4D4;line-height:1.8;max-height:160px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;">${transcript || '（テキストなし）'}</div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <button onclick="copyFullTranscript()"
          style="padding:13px;border-radius:10px;border:1.5px solid var(--border);background:#fff;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans JP',sans-serif;">
          📋 全文コピー
        </button>
        <button onclick="closeAiModal()"
          style="padding:13px;border-radius:10px;border:none;background:var(--blue);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;">
          ✓ 確認・入力修正へ
        </button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

function fieldLabel(key) {
  const map = {
    Client_Name:'依頼者氏名', Client_Kana:'依頼者ふりがな', Client_Phone:'電話番号',
    Deceased_Name:'被相続人氏名', Deceased_Kana:'被相続人ふりがな', Date_of_Death:'死亡日',
    Deceased_Address:'被相続人住所', Total_Asset_Estimate:'資産概算', Bank_Names:'金融機関',
    Client_Intention:'依頼者の意向', Distribution_Policy:'分配方針', Important_Notes:'特記事項',
    Will_Type:'遺言種別', Tax_Filing_Required:'相続税申告', Difficulty:'難易度',
    Property_Sale:'売却意向', Resident_Status:'住人有無', heirs:'相続人',
  };
  return map[key] || key;
}

function closeAiModal() {
  document.getElementById('aiResultModal')?.remove();
  currentStep = 1;
  renderStep(currentStep);
  window.scrollTo(0,0);
}

function copyFullTranscript() {
  navigator.clipboard.writeText(data.Meeting_Transcript || '').then(() => {
    alert('文字起こし全文をコピーしました');
  });
}

function formatTime(s) {
  const m = Math.floor(s/60).toString().padStart(2,'0');
  const sec = (s%60).toString().padStart(2,'0');
  return m + ':' + sec;
}

function showTranscriptModal() {
  const existing = document.getElementById('transcriptModal');
  if (existing) existing.remove();

  const totalTime = formatTime(recSeconds);
  const logHTML = transcriptLog.length
    ? transcriptLog.map(l =>
        `<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.06)">
          <span style="font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,0.3);margin-right:6px">[${l.time}]</span>${l.text}
        </div>`
      ).join('')
    : '<div style="color:rgba(255,255,255,0.2);font-style:italic;font-size:12px">文字起こしデータがありません。</div>';

  const modal = document.createElement('div');
  modal.id = 'transcriptModal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;';
  modal.innerHTML = `
    <div style="background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;padding:24px;box-shadow:var(--sh3);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div>
          <div style="font-size:17px;font-weight:700;color:var(--text)">📄 面談の文字起こし</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">
            録音時間：${totalTime} ／ ${transcriptLog.length}件の発言を記録
          </div>
        </div>
        <button onclick="document.getElementById('transcriptModal').remove()"
          style="background:var(--bg);border:none;border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer;font-weight:700;color:var(--text)">
          ✕ 閉じる
        </button>
      </div>
      <div style="height:1px;background:var(--border);margin:14px 0"></div>
      <div style="background:#1E1E1E;border-radius:12px;padding:16px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span style="font-size:11px;font-weight:700;color:#60A5FA;letter-spacing:1px;text-transform:uppercase">文字起こし全文</span>
          <span style="font-size:11px;color:rgba(255,255,255,0.3)">タイムスタンプ付き</span>
        </div>
        <div style="font-size:13px;color:#D4D4D4;line-height:1.8;max-height:200px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;">${logHTML}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px">
        <button onclick="copyTranscript('timestamped')"
          style="padding:13px;border-radius:10px;border:1.5px solid var(--border);background:#fff;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans JP',sans-serif;">
          📋 タイムスタンプ付きコピー
        </button>
        <button onclick="copyTranscript('plain')"
          style="padding:13px;border-radius:10px;border:none;background:var(--blue);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans JP',sans-serif;">
          📝 全文のみコピー
        </button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

function copyTranscript(mode) {
  const text = mode === 'plain'
    ? transcriptLog.map(l => l.text).join('\n')
    : transcriptLog.map(l => `[${l.time}] ${l.text}`).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    alert(mode === 'plain' ? '全文をコピーしました' : 'タイムスタンプ付きでコピーしました');
  });
}
