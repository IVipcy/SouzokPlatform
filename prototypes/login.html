<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>相続プラットフォーム｜ログイン</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F7F8FA;--white:#FFFFFF;--border:#E4E7EC;--border2:#CBD2DC;
  --text:#111827;--text2:#374151;--muted:#6B7280;--muted2:#9CA3AF;
  --blue:#2563EB;--blue-l:#EFF4FF;--blue-m:#BFCFFF;
  --green:#059669;--green-l:#ECFDF5;
  --amber:#D97706;--amber-l:#FFFBEB;
  --red:#DC2626;--red-l:#FEF2F2;
  --purple:#7C3AED;--purple-l:#F5F3FF;
  --sh0:0 1px 2px rgba(0,0,0,.05);
  --sh1:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 6px rgba(0,0,0,.06),0 2px 4px rgba(0,0,0,.04);
  --sh3:0 10px 25px rgba(0,0,0,.08),0 4px 10px rgba(0,0,0,.04);
  --sh4:0 20px 40px rgba(37,99,235,.12),0 8px 16px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  position:relative;
  overflow:hidden;
}

/* 背景装飾 */
.bg-deco {
  position:fixed;inset:0;pointer-events:none;z-index:0;
}
.bg-circle {
  position:absolute;border-radius:50%;filter:blur(80px);opacity:.06;
}
.bg-circle.c1 {
  width:600px;height:600px;background:var(--blue);
  top:-200px;left:-200px;
}
.bg-circle.c2 {
  width:500px;height:500px;background:var(--purple);
  bottom:-150px;right:-150px;
}
.bg-circle.c3 {
  width:300px;height:300px;background:var(--green);
  top:50%;left:50%;transform:translate(-50%,-50%);
}
.bg-grid {
  position:absolute;inset:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;
  opacity:.4;
}

/* カード */
.login-wrap {
  position:relative;z-index:1;
  width:100%;max-width:420px;
  padding:20px;
}

.login-card {
  background:var(--white);
  border:1px solid var(--border);
  border-radius:20px;
  padding:40px;
  box-shadow:var(--sh4);
  animation:slideUp .4s cubic-bezier(.16,1,.3,1) both;
}

@keyframes slideUp {
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* ロゴ */
.login-logo {
  display:flex;align-items:center;gap:12px;margin-bottom:32px;
}
.logo-icon {
  width:44px;height:44px;background:var(--blue);border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  box-shadow:0 4px 12px rgba(37,99,235,.3);
}
.logo-texts {}
.logo-main {
  font-family:'Plus Jakarta Sans',sans-serif;
  font-weight:800;font-size:16px;letter-spacing:-.3px;color:var(--text);
}
.logo-sub {
  font-size:10px;color:var(--muted);margin-top:1px;
  font-family:'DM Mono',monospace;letter-spacing:.5px;
}

/* ヘッドライン */
.login-headline {
  font-family:'Plus Jakarta Sans',sans-serif;
  font-weight:700;font-size:22px;letter-spacing:-.5px;
  color:var(--text);margin-bottom:6px;
}
.login-sub {
  font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.6;
}

/* フォーム */
.form-group {
  margin-bottom:16px;
}
.form-label {
  display:block;font-size:12px;font-weight:600;color:var(--text2);
  margin-bottom:6px;
}
.form-label span {
  color:var(--red);margin-left:2px;
}
.form-input-wrap {
  position:relative;
}
.form-input {
  width:100%;padding:10px 14px 10px 38px;
  border:1.5px solid var(--border);
  border-radius:8px;
  font-size:14px;font-family:'Noto Sans JP',sans-serif;
  color:var(--text);background:var(--white);
  outline:none;transition:border-color .15s,box-shadow .15s;
}
.form-input::placeholder{color:var(--muted2)}
.form-input:focus {
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(37,99,235,.1);
}
.form-input.error {
  border-color:var(--red);
  box-shadow:0 0 0 3px rgba(220,38,38,.08);
}
.input-icon {
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  font-size:14px;pointer-events:none;
}
.toggle-pw {
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--muted);
  font-size:14px;padding:2px;line-height:1;
  transition:color .12s;
}
.toggle-pw:hover{color:var(--text2)}

.form-error {
  font-size:11px;color:var(--red);margin-top:5px;
  display:none;
}
.form-error.show{display:block}

/* オプション行 */
.form-opts {
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.remember {
  display:flex;align-items:center;gap:7px;cursor:pointer;
}
.remember input[type=checkbox] {
  width:14px;height:14px;accent-color:var(--blue);cursor:pointer;
}
.remember span {
  font-size:12px;color:var(--text2);
}
.forgot-link {
  font-size:12px;color:var(--blue);text-decoration:none;font-weight:500;
}
.forgot-link:hover{text-decoration:underline}

/* ログインボタン */
.btn-login {
  width:100%;padding:12px;
  background:var(--blue);color:#fff;
  border:none;border-radius:8px;
  font-size:14px;font-weight:700;
  font-family:'Noto Sans JP',sans-serif;
  cursor:pointer;
  transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  letter-spacing:.3px;
}
.btn-login:hover:not(:disabled){background:#1D4ED8;box-shadow:0 4px 12px rgba(37,99,235,.3);transform:translateY(-1px)}
.btn-login:active{transform:translateY(0)}
.btn-login:disabled{opacity:.6;cursor:not-allowed}
.btn-login .spinner {
  width:16px;height:16px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .6s linear infinite;
  display:none;
}
.btn-login.loading .btn-text{display:none}
.btn-login.loading .spinner{display:block}

@keyframes spin{to{transform:rotate(360deg)}}

/* デモロール */
.demo-roles {
  margin-top:24px;
  padding-top:20px;
  border-top:1px solid var(--border);
}
.demo-title {
  font-size:11px;font-weight:600;color:var(--muted);
  letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;
  text-align:center;
}
.role-grid {
  display:grid;grid-template-columns:1fr 1fr;gap:7px;
}
.role-btn {
  padding:8px 10px;border-radius:7px;border:1.5px solid var(--border);
  background:var(--white);cursor:pointer;text-align:left;
  transition:all .12s;font-family:'Noto Sans JP',sans-serif;
}
.role-btn:hover{border-color:var(--blue-m);background:var(--blue-l)}
.role-btn .role-name {font-size:12px;font-weight:600;color:var(--text)}
.role-btn .role-desc {font-size:10px;color:var(--muted);margin-top:1px}

/* エラーアラート */
.alert {
  padding:10px 14px;border-radius:8px;font-size:12px;
  display:flex;align-items:center;gap:8px;margin-bottom:16px;
  animation:fadeIn .2s ease;
  display:none;
}
.alert.show{display:flex}
.alert-error{background:var(--red-l);border:1px solid #FECACA;color:var(--red)}
.alert-success{background:var(--green-l);border:1px solid #A7F3D0;color:var(--green)}

@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* フッター */
.login-footer {
  text-align:center;margin-top:24px;
  font-size:11px;color:var(--muted2);line-height:1.8;
}

/* バージョンバッジ */
.ver-badge {
  display:inline-flex;align-items:center;gap:4px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:100px;padding:3px 10px;
  font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);
  margin-bottom:20px;
}
.ver-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block}
</style>
</head>
<body>

<!-- 背景 -->
<div class="bg-deco">
  <div class="bg-grid"></div>
  <div class="bg-circle c1"></div>
  <div class="bg-circle c2"></div>
  <div class="bg-circle c3"></div>
</div>

<div class="login-wrap">
  <div class="login-card">

    <!-- ロゴ -->
    <div class="login-logo">
      <div class="logo-icon">⚖️</div>
      <div class="logo-texts">
        <div class="logo-main">相続プラットフォーム</div>
        <div class="logo-sub">OCEAN · INHERITANCE SYSTEM</div>
      </div>
    </div>

    <!-- バージョン -->
    <div class="ver-badge">
      <span class="ver-dot"></span>
      v1.0 · Production
    </div>

    <!-- ヘッドライン -->
    <div class="login-headline">おかえりなさい</div>
    <div class="login-sub">メールアドレスとパスワードでログインしてください</div>

    <!-- アラート -->
    <div class="alert alert-error" id="alertError">
      <span>⚠️</span>
      <span id="alertMsg">メールアドレスまたはパスワードが正しくありません</span>
    </div>
    <div class="alert alert-success" id="alertSuccess">
      <span>✓</span>
      <span>ログイン中... ダッシュボードへ移動します</span>
    </div>

    <!-- フォーム -->
    <div class="form-group">
      <label class="form-label" for="email">メールアドレス<span>*</span></label>
      <div class="form-input-wrap">
        <span class="input-icon">✉️</span>
        <input class="form-input" type="email" id="email"
          placeholder="you@ocean-inc.co.jp" autocomplete="email"
          oninput="clearError()">
      </div>
      <div class="form-error" id="emailError">正しいメールアドレスを入力してください</div>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">パスワード<span>*</span></label>
      <div class="form-input-wrap">
        <span class="input-icon">🔒</span>
        <input class="form-input" type="password" id="password"
          placeholder="••••••••" autocomplete="current-password"
          oninput="clearError()" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="toggle-pw" type="button" onclick="togglePw()" id="pwToggle" title="パスワードを表示">👁</button>
      </div>
      <div class="form-error" id="pwError">パスワードを入力してください</div>
    </div>

    <div class="form-opts">
      <label class="remember">
        <input type="checkbox" id="remember">
        <span>ログイン状態を保持</span>
      </label>
      <a href="#" class="forgot-link">パスワードを忘れた方</a>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <span class="btn-text">ログイン</span>
      <div class="spinner"></div>
    </button>

    <!-- デモロール -->
    <div class="demo-roles">
      <div class="demo-title">デモ用クイックログイン</div>
      <div class="role-grid">
        <button class="role-btn" onclick="fillDemo('tanaka@ocean.co.jp','demo1234','田中 受注担当')">
          <div class="role-name">👔 受注担当</div>
          <div class="role-desc">田中 · 案件全般</div>
        </button>
        <button class="role-btn" onclick="fillDemo('sato@ocean.co.jp','demo1234','佐藤 管理担当')">
          <div class="role-name">📋 管理担当</div>
          <div class="role-desc">佐藤 · タスク監督</div>
        </button>
        <button class="role-btn" onclick="fillDemo('yamamoto@ocean.co.jp','demo1234','山本 アシスタント')">
          <div class="role-name">🗂️ アシスタント</div>
          <div class="role-desc">山本 · 実務処理</div>
        </button>
        <button class="role-btn" onclick="fillDemo('keiri@ocean.co.jp','demo1234','経理 担当')">
          <div class="role-name">💴 経理</div>
          <div class="role-desc">経理 · 入金管理</div>
        </button>
      </div>
    </div>

  </div>

  <div class="login-footer">
    © 2025 OCEAN Inc. · 相続プラットフォーム<br>
    不明な点は管理者までお問い合わせください
  </div>
</div>

<script>
let pwVisible = false;

function togglePw() {
  pwVisible = !pwVisible;
  const inp = document.getElementById('password');
  inp.type = pwVisible ? 'text' : 'password';
  document.getElementById('pwToggle').textContent = pwVisible ? '🙈' : '👁';
}

function clearError() {
  document.getElementById('alertError').classList.remove('show');
  document.getElementById('email').classList.remove('error');
  document.getElementById('password').classList.remove('error');
  document.getElementById('emailError').classList.remove('show');
  document.getElementById('pwError').classList.remove('show');
}

function fillDemo(email, pw, name) {
  document.getElementById('email').value = email;
  document.getElementById('password').value = pw;
  clearError();
  // デモ用にロール名を一時表示
  const btn = document.getElementById('loginBtn');
  btn.querySelector('.btn-text').textContent = name + ' でログイン';
  setTimeout(() => {
    btn.querySelector('.btn-text').textContent = 'ログイン';
  }, 2000);
}

function validate() {
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;
  let ok = true;
  if (!email || !email.includes('@')) {
    document.getElementById('email').classList.add('error');
    document.getElementById('emailError').classList.add('show');
    ok = false;
  }
  if (!pw) {
    document.getElementById('password').classList.add('error');
    document.getElementById('pwError').classList.add('show');
    ok = false;
  }
  return ok;
}

async function doLogin() {
  clearError();
  if (!validate()) return;

  const btn = document.getElementById('loginBtn');
  btn.classList.add('loading');
  btn.disabled = true;

  // デモ: 1.2秒後にログイン成功
  await new Promise(r => setTimeout(r, 1200));

  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;

  // デモ用パスワードチェック
  const DEMO_ACCOUNTS = {
    'tanaka@ocean.co.jp': 'demo1234',
    'sato@ocean.co.jp': 'demo1234',
    'yamamoto@ocean.co.jp': 'demo1234',
    'keiri@ocean.co.jp': 'demo1234',
  };

  btn.classList.remove('loading');
  btn.disabled = false;

  if (DEMO_ACCOUNTS[email] === pw || (email && pw.length >= 4)) {
    // 成功
    document.getElementById('alertSuccess').classList.add('show');
    btn.disabled = true;
    setTimeout(() => {
      window.location.href = 'dashboard.html';
    }, 1200);
  } else {
    document.getElementById('alertError').classList.add('show');
    document.getElementById('email').classList.add('error');
    document.getElementById('password').classList.add('error');
  }
}
</script>
</body>
</html>
